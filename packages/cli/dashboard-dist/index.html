<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentinel Dashboard</title>
    <script type="module" crossorigin src="/assets/index-DWfRDHhN.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CgvXDbOX.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Blocking script: apply dark class before React hydrates to prevent flash
      (function() {
        var theme = localStorage.getItem('sentinel-theme') || 'system';
        var dark = theme === 'dark' ||
          (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </body>
</html>
