name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Patch package versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkgs = [
              'package.json',
              'packages/types/package.json',
              'packages/db/package.json',
              'packages/storage/package.json',
              'packages/adapters/package.json',
              'packages/capture/package.json',
              'packages/cli/package.json',
            ];
            for (const p of pkgs) {
              const json = JSON.parse(fs.readFileSync(p, 'utf8'));
              json.version = '${VERSION}';
              fs.writeFileSync(p, JSON.stringify(json, null, 2) + '\n');
              console.log('Patched', p, 'to', '${VERSION}');
            }
          "

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish packages
        run: |
          # Publish in dependency order (uses OIDC trusted publishing, no token needed)
          # Tier 1: no internal deps
          pnpm --filter @sentinel-vrt/types publish --no-git-checks --access public --provenance

          # Tier 2: depends on types only
          pnpm --filter @sentinel-vrt/db publish --no-git-checks --access public --provenance
          pnpm --filter @sentinel-vrt/storage publish --no-git-checks --access public --provenance

          # Tier 3: depends on db, storage, types
          pnpm --filter @sentinel-vrt/adapters publish --no-git-checks --access public --provenance

          # Tier 4: depends on adapters, db, storage, types
          pnpm --filter @sentinel-vrt/capture publish --no-git-checks --access public --provenance

          # Tier 5: the CLI (user-facing)
          pnpm --filter @sentinel-vrt/cli publish --no-git-checks --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
