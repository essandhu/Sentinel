name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel in-progress previews for the same PR
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    # Only run if Cloudflare secrets are configured
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dashboard (local mode)
        run: pnpm --filter @sentinel/dashboard run build:local

      - name: Create Cloudflare Pages project (if needed)
        run: npx wrangler@3 pages project create sentinel-preview --production-branch=main 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          set -o pipefail
          npx wrangler@3 pages deploy apps/dashboard/dist-local \
            --project-name=sentinel-preview \
            --commit-dirty=true \
            --branch=pr-${{ github.event.pull_request.number }} \
            2>&1 | tee /tmp/wrangler-output.txt
          URL=$(grep -oP 'https://[^\s]+\.pages\.dev' /tmp/wrangler-output.txt | tail -1)
          echo "deployment-url=$URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        if: always() && steps.deploy.outputs.deployment-url
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const body = `### Preview Deployment\n\n🔗 **Preview URL:** ${url}\n\n_Built from ${context.sha.substring(0, 7)} • dashboard only (no API backend)_`;

            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('### Preview Deployment')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
